<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>ANVIL — Вход</title>
</head>
<body>
    <div class="container">
        <div class="anvil-logo">⚙️ ANVIL ⚙️</div>
        <div class="form-box">
            <h2>Авторизация</h2>
            <input type="text" id="loginUsername" placeholder="Логин">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <hr>
            <h3>Регистрация</h3>
            <input type="text" id="regUsername" placeholder="Логин">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
        </div>
    </div>
    <script>
        const API = 'http://localhost:5000/api';

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const res = await fetch(`${API}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            alert(data.message || data.error);
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('isAdmin', data.isAdmin);
                if (data.isAdmin) window.location.href = 'admin.html';
                else window.location.href = 'index.html';
            } else {
                alert('Ошибка входа');
            }
        }
    </script>
</body>
</html>
