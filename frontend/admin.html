<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>ANVIL — Админ панель</title>
</head>
<body>
    <div class="header">
        <h1>🔧 Администратор ANVIL</h1>
        <button onclick="logout()">Выйти</button>
    </div>
    <div class="admin-panel">
        <h2>Управление событиями (матчи / эфиры)</h2>
        <form id="eventForm">
            <input type="text" id="eventId" placeholder="ID (для редактирования)" style="display:none">
            <input type="text" id="title" placeholder="Название матча / шоу" required>
            <input type="datetime-local" id="datetime" required>
            <input type="text" id="url" placeholder="URL для вставки (YouTube, Twitch, VK)" required>
            <button type="submit">Сохранить</button>
        </form>
        <hr>
        <div id="adminEventsList"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
